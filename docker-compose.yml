version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - VERSION_API_BASE=http://chromadb:8001
    depends_on:
      - chromadb
      - rl_backend

  chromadb:
    build:
      context: ./backend/chroma_service
      dockerfile: dockerfile.chromadb
    ports:
      - "8001:8001"
    environment:
      - CHROMA_PERSIST_PATH=/data/chroma
    volumes:
      - chroma_data:/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/version/history')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  rl_backend:
    build:
      context: ./backend/chroma_service
      dockerfile: dockerfile.rl
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  chroma_data:
